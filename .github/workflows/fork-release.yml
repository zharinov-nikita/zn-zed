# zn-zed fork: builds an unsigned Windows installer on every push to main and
# publishes it as a GitHub release tagged `nightly-<version>-<sha>`. The
# auto-updater (crates/auto_update/src/fork_updates.rs) reads the latest
# release and parses the commit sha out of the tag.
name: fork-release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fork-release
  cancel-in-progress: true

jobs:
  bundle-windows-x86_64:
    # The self-hosted runner keeps target/ warm between runs, which turns a
    # ~2.5h cold build into an incremental one and skips the ~2h queue wait for
    # a hosted windows runner. Fall back to `windows-2022` by editing this line
    # if the machine is offline.
    runs-on: [self-hosted, windows, x64, zed-build]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          # `git clean -ffdx` (the default) would wipe target/ on every run and
          # defeat the whole point of a persistent runner.
          clean: false
          # Full history + tags so the release-notes step can diff against the
          # previous nightly tag. On the self-hosted runner this is incremental.
          fetch-depth: 0

      - name: Set release channel to nightly
        shell: pwsh
        run: Set-Content -Path crates/zed/RELEASE_CHANNEL -Value nightly -NoNewline

      - name: Enable long paths
        # cargo checks out python-environment-tools, whose test fixtures exceed
        # MAX_PATH; see docs/src/development/windows.md ("path too long").
        # Needs admin, so only on hosted runners — the self-hosted machine has
        # LongPathsEnabled set once, by hand.
        if: runner.environment == 'github-hosted'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null

      - name: Ensure Inno Setup 6
        shell: pwsh
        run: |
          $paths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          )
          if ($paths | Where-Object { Test-Path $_ }) { exit 0 }
          if ($env:RUNNER_ENVIRONMENT -eq 'self-hosted') {
            throw "ISCC.exe not found. Install Inno Setup 6 on this machine (winget install JRSoftware.InnoSetup)."
          }
          choco install innosetup -y --no-progress

      - name: Log disk space
        shell: pwsh
        run: Get-PSDrive -PSProvider FileSystem

      - name: Bundle
        shell: pwsh
        run: script/bundle-windows.ps1 -Architecture x86_64
        env:
          # Neutralizes the signing/Azure gates in bundle-windows.ps1 and
          # zed.iss, which are all `$env:CI` truthiness checks.
          CI: ""
          ZED_COMMIT_SHA: ${{ github.sha }}
          CARGO_INCREMENTAL: "0"

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $v = ((cargo metadata --no-deps --offline | ConvertFrom-Json).packages | Where-Object name -eq zed).version
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $sha = "${{ github.sha }}"
          $notesFile = "target/release-notes.md"

          # The current release isn't created yet, so the latest existing one is
          # the previous nightly. Its tag is `nightly-<version>-<40-hex-sha>`.
          $prevTag = gh release list --limit 1 --json tagName -q '.[0].tagName' 2>$null
          $prevSha = if ($prevTag) { ($prevTag -split '-')[-1] } else { $null }

          $body = "Automated build of $sha"
          if ($prevSha -and (git cat-file -e "$prevSha^{commit}" 2>$null; $LASTEXITCODE -eq 0)) {
            # --first-parent keeps the log to commits that landed directly on
            # main: your own feat/fix commits, plus each upstream merge collapsed
            # to a single line instead of thousands of upstream commits.
            $log = git log --first-parent --pretty=format:'- %s (%h)' "$prevSha..$sha"
            if ($log) {
              $range = "$($prevSha.Substring(0,7))..$($sha.Substring(0,7))"
              $body = "### Changes since previous nightly ($range)`n`n" + ($log -join "`n")
            } else {
              $body = "No changes since previous nightly ($($prevSha.Substring(0,7)))."
            }
          }

          Set-Content -Path $notesFile -Value $body -NoNewline
          "file=$notesFile" >> $env:GITHUB_OUTPUT

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "nightly-${{ steps.ver.outputs.version }}-${{ github.sha }}"
          gh release create $tag `
            target/Zed-x86_64.exe `
            target/zed-remote-server-windows-x86_64.zip `
            --title "Zed Nightly $tag" `
            --latest `
            --notes-file "${{ steps.notes.outputs.file }}"
