# zn-zed fork: builds an unsigned Windows installer on every push to main and
# publishes it as a GitHub release tagged `nightly-<version>-<sha>`. The
# auto-updater (crates/auto_update/src/fork_updates.rs) reads the latest
# release and parses the commit sha out of the tag.
name: fork-release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fork-release
  # A build runs for hours; cancelling it on the next push to main meant most
  # runs died before producing a release. Let them queue instead.
  cancel-in-progress: false

jobs:
  # A syntax error in a pwsh step used to surface only after the two-hour
  # Bundle step had already run (run 29911588045 died on a stray `;`). Parse
  # the scripts up front so a typo costs 30 seconds instead of a build.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in Get-ChildItem script -Filter *.ps1) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName, [ref]$null, [ref]$errors) | Out-Null
            if ($errors) {
              $failed = $true
              Write-Host "::error file=script/$($file.Name)::$($errors[0].Message)"
            }
          }
          if ($failed) { exit 1 }
          Write-Host "All scripts parsed."

  bundle-windows-x86_64:
    needs: preflight
    # Hosted runner: the build is cold every time (~2.5h plus queue wait), but it
    # doesn't tie up a local machine. Swap in `[self-hosted, windows, x64,
    # zed-build]` to build on the personal runner, which keeps target/ warm —
    # that also needs `clean: false` on the checkout below.
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the release-notes step can diff against the
          # previous nightly tag.
          fetch-depth: 0

      - name: Set release channel to nightly
        shell: pwsh
        run: Set-Content -Path crates/zed/RELEASE_CHANNEL -Value nightly -NoNewline

      - name: Enable long paths
        # cargo checks out python-environment-tools, whose test fixtures exceed
        # MAX_PATH; see docs/src/development/windows.md ("path too long").
        # Needs admin, so only on hosted runners — the self-hosted machine has
        # LongPathsEnabled set once, by hand.
        if: runner.environment == 'github-hosted'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null

      - name: Ensure Inno Setup 6
        shell: pwsh
        run: |
          $paths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          )
          if ($paths | Where-Object { Test-Path $_ }) { exit 0 }
          if ($env:RUNNER_ENVIRONMENT -eq 'self-hosted') {
            throw "ISCC.exe not found. Install Inno Setup 6 on this machine (winget install JRSoftware.InnoSetup)."
          }
          choco install innosetup -y --no-progress

      - name: Log disk space
        shell: pwsh
        run: Get-PSDrive -PSProvider FileSystem

      # Version and release notes depend only on the checkout, so they run
      # before the expensive step -- a failure here should cost seconds.
      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $v = (Select-String -Path crates/zed/Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          script/fork-release-notes.ps1 -Sha "${{ github.sha }}" -OutFile target/release-notes.md
          "file=target/release-notes.md" >> $env:GITHUB_OUTPUT

      - name: Bundle
        shell: pwsh
        run: script/bundle-windows.ps1 -Architecture x86_64
        env:
          # Neutralizes the signing/Azure gates in bundle-windows.ps1 and
          # zed.iss, which are all `$env:CI` truthiness checks.
          CI: ""
          ZED_COMMIT_SHA: ${{ github.sha }}
          CARGO_INCREMENTAL: "0"

      # Keeps the installer reachable even if publishing fails, so a broken
      # release step never costs the whole build again.
      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zed-windows-x86_64
          path: |
            target/Zed-x86_64.exe
            target/zed-remote-server-windows-x86_64.zip
          if-no-files-found: warn
          retention-days: 7

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "nightly-${{ steps.ver.outputs.version }}-${{ github.sha }}"
          gh release create $tag `
            target/Zed-x86_64.exe `
            target/zed-remote-server-windows-x86_64.zip `
            --title "Zed Nightly $tag" `
            --latest `
            --notes-file "${{ steps.notes.outputs.file }}"
